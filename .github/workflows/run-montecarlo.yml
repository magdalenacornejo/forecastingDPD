name: Run Monte Carlo Batch

on:
  workflow_dispatch:
  push:
    paths:
      - 'montecarlo_batch.R'
      - '.github/workflows/run-montecarlo.yml'

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libssl-dev libxml2-dev

      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("plm","dplyr","glmnet","fastDummies","remotes"), repos="https://cloud.r-project.org")'
          Rscript -e 'remotes::install_github("soonwookwon/FEShR")'

      - name: Run simulation
        run: Rscript montecarlo_batch.R

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: montecarlo-outputs
          path: outputs/
          if-no-files-found: error
